name: Live Match Automation Bot

on:
  schedule:
    # 3:00 PM IST (09:30 UTC) - Weekends
    - cron: '30 9 * * 0,6'
    
    # 7:00 PM IST (13:30 UTC) - Every day
    - cron: '30 13 * * *'

  # Allow manual triggering from the GitHub Actions UI just in case
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Allows the script to stay alive parsing updates for up to 5 hours (300 mins) to cover an entire T20 match safely
    timeout-minutes: 300 

    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v3

      - name: Setup Node.js Setup
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cloud Dependencies
        run: npm i firebase-admin axios dotenv

      - name: Run Live Monitor Engine
        env:
          CRICKET_API_KEY: ${{ secrets.CRICKET_API_KEY }}
          CRICKET_API_KEY_BACKUP: ${{ secrets.CRICKET_API_KEY_BACKUP }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        # Exits natively natively with code 0 once the match finishes or rains out
        run: node automation/monitor.js
